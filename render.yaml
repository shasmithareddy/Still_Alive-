services:
  - type: web
    name: stillalive-backend
    env: node
    region: us-east
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Note: Render will auto-detect health checks. If using custom domain, update VITE_BACKEND_URL in frontend accordingly
